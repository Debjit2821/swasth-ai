<!DOCTYPE html>
<html>

<head>

    <title>Medical Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow border-0 rounded-4">

        <div class="card-body p-5">

            <h2 class="mb-4">

                Medical Report

            </h2>

            <h4>

                Diagnosis & Advice

            </h4>

            <div class="alert alert-primary">

                <pre style="white-space: pre-wrap;
font-family: inherit;">

{{ report.doctor_notes }}

                </pre>

            </div>

            <h4 class="mt-4">

                Prescription

            </h4>

            <div class="alert alert-success">

                <pre style="white-space: pre-wrap;
font-family: inherit;">

{{ report.medicine_schedule }}

                </pre>

            </div>

            <h4 class="mt-4">

                AI Simplified Summary

            </h4>

            <div class="alert alert-info">

                <pre style="white-space: pre-wrap;
font-family: inherit;">

{{ report.ai_summary }}

                </pre>

            </div>

            <!-- FOLLOW-UP SECTION -->

            <hr class="mt-5 mb-4">

            <h4>

                AI Recovery Follow-Up

            </h4>

            <p>

                How are you feeling after following the treatment?

            </p>

            <form method="POST"
                  action="/report-followup/{{ report.case_id }}">

                <textarea
                    name="followup"
                    class="form-control"
                    rows="4"
                    placeholder="Describe your current condition..."
                    required></textarea>

                <button
                    type="submit"
                    class="btn btn-primary mt-3">

                    Analyze Recovery

                </button>

            </form>

            <a
                href="/dashboard"
                class="btn btn-outline-dark mt-4">

                Back to Dashboard

            </a>

        </div>

    </div>

</div>

</body>

</html>
