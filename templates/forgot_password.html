<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password - SWASTH-AI</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;

            font-family:Arial,sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #0ea5e9
            );

            overflow:hidden;

            position:relative;
        }

        /* BACKGROUND CIRCLE */

        body::before{

            content:"";

            position:absolute;

            width:350px;
            height:350px;

            background:
            rgba(255,255,255,0.08);

            border-radius:50%;

            top:-120px;
            left:-120px;
        }

        body::after{

            content:"";

            position:absolute;

            width:300px;
            height:300px;

            background:
            rgba(255,255,255,0.08);

            border-radius:50%;

            bottom:-120px;
            right:-120px;
        }

        /* CARD */

        .forgot-card{

            width:450px;

            padding:45px;

            border-radius:28px;

            background:
            rgba(255,255,255,0.08);

            backdrop-filter:blur(14px);

            border:
            1px solid rgba(255,255,255,0.1);

            box-shadow:
            0 10px 30px rgba(0,0,0,0.25);

            position:relative;

            z-index:10;

            color:white;
        }

        /* ICON */

        .icon{

            text-align:center;

            font-size:70px;

            color:#38bdf8;

            margin-bottom:20px;
        }

        /* TITLE */

        .forgot-card h1{

            text-align:center;

            font-size:52px;

            margin-bottom:12px;

            font-weight:800;
        }

        /* SUBTITLE */

        .subtitle{

            text-align:center;

            color:#dbeafe;

            margin-bottom:35px;

            line-height:1.7;
        }

        /* LABEL */

        label{

            display:block;

            margin-bottom:10px;

            font-size:18px;

            font-weight:bold;
        }

        /* INPUT */

        input{

            width:100%;

            padding:18px;

            border:none;

            outline:none;

            border-radius:14px;

            background:
            rgba(255,255,255,0.12);

            color:white;

            font-size:17px;

            margin-bottom:25px;
        }

        input::placeholder{

            color:#dbeafe;
        }

        /* BUTTON */

        button{

            width:100%;

            padding:18px;

            border:none;

            border-radius:14px;

            background:
            linear-gradient(
                135deg,
                #38bdf8,
                #0ea5e9
            );

            color:white;

            font-size:20px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-5px);

            box-shadow:
            0 10px 20px rgba(0,0,0,0.25);
        }

        /* BACK LINK */

        .back{

            text-align:center;

            margin-top:25px;
        }

        .back a{

            color:#dbeafe;

            text-decoration:none;

            font-size:17px;
        }

        .back a:hover{

            color:white;
        }

    </style>

</head>

<body>

    <div class="forgot-card">

        <div class="icon">

            <i class="fa-solid fa-key"></i>

        </div>

        <h1>

            Forgot Password

        </h1>

        <p class="subtitle">

            Enter your registered email address
            to receive a password reset link.

        </p>

        <!-- FORM -->

        <form>

            <label>

                Email Address

            </label>

            <input
                type="email"
                placeholder="Enter your email"
                required>

            <button type="submit">

                Send Reset Link

            </button>

        </form>

        <!-- BACK -->

        <div class="back">

            <a href="login.html">

                ← Back to Login

            </a>

        </div>

    </div>

</body>

</html>
