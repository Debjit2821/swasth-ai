<!DOCTYPE html>
<html>

<head>

    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card p-4">

            <h2 class="mb-4">

                Reset Password

            </h2>

            {% with messages = get_flashed_messages(with_categories=true) %}

                {% if messages %}

                    {% for category, message in messages %}

                        <div class="alert alert-{{ category }}">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

            {% endif %}

            {% endwith %}

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        New Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Reset Password

                </button>

            </form>

        </div>

    </div>

</body>

</html>
