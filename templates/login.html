<!DOCTYPE html>
<html>

<head>

    <title>Login - SWASTH-AI</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body {

            background: linear-gradient(
                to right,
                #4facfe,
                #00f2fe
            );

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .login-card {

            width: 420px;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0px 5px 25px rgba(0,0,0,0.15);
        }

        .title {

            text-align: center;

            margin-bottom: 30px;

            font-weight: bold;

            color: #0d6efd;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <h2 class="title">

            SWASTH-AI Login

        </h2>

        <!-- FLASH MESSAGES -->

        {% with messages =
            get_flashed_messages(
                with_categories=true
            )
        %}

            {% if messages %}

                {% for category, message in messages %}

                    <div class="alert alert-{{ category }}">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <!-- LOGIN FORM -->

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Email

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Login

            </button>

            <!-- FORGOT PASSWORD -->

            <div class="text-end mt-2">

                <a href="/forgot-password"
                   class="text-decoration-none">

                    Forgot Password?

                </a>

            </div>

        </form>

        <hr>

        
        <div class="text-center mt-3">

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </div>

    </div>

</body>

</html>
