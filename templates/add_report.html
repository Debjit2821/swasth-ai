<!DOCTYPE html>
<html>

<head>

    <title>Add Medical Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow border-0 rounded-4 p-5">

        <h2 class="mb-4">

            Add Medical Report

        </h2>

        <form method="POST">

            <label class="form-label">

                Diagnosis

            </label>

            <textarea
                name="diagnosis"
                class="form-control mb-4"
                rows="4"
                required></textarea>

            <label class="form-label">

                Prescription / Medicines

            </label>

            <textarea
                name="prescription"
                class="form-control mb-4"
                rows="4"
                required></textarea>

            <label class="form-label">

                Advice / Follow-up

            </label>

            <textarea
                name="advice"
                class="form-control mb-4"
                rows="4"
                required></textarea>

            <button
                type="submit"
                class="btn btn-primary">

                Save Report

            </button>

        </form>

    </div>

</div>

</body>

</html>
