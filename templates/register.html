<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register - SWASTH-AI</title>

    <!-- BOOTSTRAP -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #0ea5e9
            );

            overflow:hidden;

            position:relative;
        }

        /* BACKGROUND */

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.08);
        }

        .circle1{

            width:300px;
            height:300px;

            top:-120px;
            left:-100px;
        }

        .circle2{

            width:350px;
            height:350px;

            bottom:-120px;
            right:-100px;
        }

        /* CARD */

        .register-card{

            width:450px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.15);

            padding:40px;

            border-radius:25px;

            box-shadow:0 10px 35px rgba(0,0,0,0.3);

            color:white;

            z-index:10;
        }

        .icon{

            text-align:center;

            font-size:55px;

            margin-bottom:15px;

            color:#38bdf8;
        }

        .title{

            text-align:center;

            margin-bottom:30px;
        }

        .title h1{

            font-size:42px;

            font-weight:bold;

            margin-bottom:10px;
        }

        .title p{

            color:#dbeafe;

            font-size:17px;
        }

        /* INPUTS */

        .input-box{

            margin-bottom:20px;
        }

        .input-box label{

            display:block;

            margin-bottom:8px;

            font-weight:600;
        }

        .input-box input,
        .input-box select{

            width:100%;

            padding:14px;

            border-radius:12px;

            border:1px solid rgba(255,255,255,0.1);

            background:rgba(255,255,255,0.12);

            outline:none;

            color:white;

            font-size:16px;

            transition:0.3s;
        }

        .input-box input::placeholder{

            color:#dbeafe;
        }

        .input-box select option{

            color:black;
        }

        .input-box input:focus,
        .input-box select:focus{

            border:1px solid #38bdf8;

            box-shadow:0 0 10px rgba(56,189,248,0.5);
        }

        /* BUTTON */

        .register-btn{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            background:linear-gradient(
                to right,
                #38bdf8,
                #0ea5e9
            );

            color:white;

            font-size:18px;

            font-weight:bold;

            transition:0.3s;
        }

        .register-btn:hover{

            transform:translateY(-4px);

            background:linear-gradient(
                to right,
                #0ee915,
                #02c74a
            );
        }

        /* LOGIN */

        .bottom-text{

            text-align:center;

            margin-top:20px;
        }

        .bottom-text a{

            color:#93c5fd;

            text-decoration:none;

            font-weight:bold;
        }

        .bottom-text a:hover{

            text-decoration:underline;
        }

        /* RESPONSIVE */

        @media(max-width:600px){

            .register-card{

                width:95%;
                padding:30px 20px;
            }

            .title h1{

                font-size:32px;
            }
        }

    </style>

</head>

<body>

    <!-- BACKGROUND -->

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <!-- REGISTER CARD -->

    <div class="register-card">

        <!-- ICON -->

        <div class="icon">

            <i class="fa-solid fa-user-plus"></i>

        </div>

        <!-- TITLE -->

        <div class="title">

            <h1>SWASTH-AI</h1>

            <p>
                Smart Healthcare Registration System
            </p>

        </div>

        <!-- FORM -->

        <form method="POST">

            <!-- FULL NAME -->

            <div class="input-box">

                <label>

                    Full Name

                </label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter your full name"
                    required>

            </div>

            <!-- EMAIL -->

            <div class="input-box">

                <label>

                    Email

                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>
            <div class="mb-3">

                <label class="form-label">
                
                    Phone Number
                
                </label>
            
                <input
                    type="text"
                    name="phone_number"
                    class="form-control"
                    placeholder="Enter Phone Number"
                    required>

            </div>

            <!-- PASSWORD -->

            <div class="input-box">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <!-- ROLE -->

            <div class="input-box">

                <label>

                    Role

                </label>

                <select
                    name="role"
                    id="roleSelect"
                    required>

                    <option value="user">

                        Patient

                    </option>

                    <option value="supervisor">

                        Doctor / Supervisor

                    </option>

                </select>

            </div>

            <!-- SPECIALIZATION -->

            <div class="input-box"
                 id="specializationField"
                 style="display:none;">

                <label>

                    Specialization

                </label>

                <select
                    name="specialization">

                    <option>

                        General Physician

                    </option>

                    <option>

                        Cardiologist

                    </option>

                    <option>

                        Dermatologist

                    </option>

                    <option>

                        Psychiatrist

                    </option>

                    <option>

                        Neurologist

                    </option>

                </select>

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="register-btn">

                Register Now

            </button>

        </form>

        <!-- LOGIN -->

        <div class="bottom-text">

            Already have an account?

            <a href="{{ url_for('login') }}"

                Login

            </a>
        <a
            href="/google-login"
            class="btn btn-danger w-100 mt-3">
            Continue with Google
        </a>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

        const roleSelect =
            document.getElementById(
                "roleSelect"
            );

        const specializationField =
            document.getElementById(
                "specializationField"
            );

        roleSelect.addEventListener(
            "change",
            function () {

                if (
                    this.value ===
                    "supervisor"
                ) {

                    specializationField.style.display =
                        "block";

                } else {

                    specializationField.style.display =
                        "none";
                }
            }
        );

    </script>

</body>

</html>
