<!DOCTYPE html>
<html>

<head>

    <title>Register - SWASTH-AI</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body {

            background: linear-gradient(
                to right,
                #43cea2,
                #185a9d
            );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 30px;
        }

        .register-card {

            width: 500px;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0px 5px 25px rgba(0,0,0,0.15);
        }

        .title {

            text-align: center;

            margin-bottom: 30px;

            font-weight: bold;

            color: #198754;
        }

    </style>

</head>

<body>

    <div class="register-card">

        <h2 class="title">

            SWASTH-AI Registration

        </h2>

        <!-- FLASH MESSAGES -->

        {% with messages =
            get_flashed_messages(
                with_categories=true
            )
        %}

            {% if messages %}

                {% for category, message in messages %}

                    <div class="alert alert-{{ category }}">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <!-- REGISTER FORM -->

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Full Name

                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Email

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>
            <div class="mb-3">

                <label class="form-label">
                
                    Phone Number
                
                </label>
            
                <input
                    type="text"
                    name="phone_number"
                    class="form-control"
                    placeholder="Enter Phone Number"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Role

                </label>

                <select
                    name="role"
                    class="form-select"
                    id="roleSelect"
                    required>

                    <option value="user">

                        Patient

                    </option>

                    <option value="supervisor">

                        Doctor / Supervisor

                    </option>

                </select>

            </div>

            <!-- SPECIALIZATION -->

            <div class="mb-3"
                 id="specializationField"
                 style="display:none;">

                <label class="form-label">

                    Specialization

                </label>

                <select
                    name="specialization"
                    class="form-select">

                    <option>

                        General Physician

                    </option>

                    <option>

                        Cardiologist

                    </option>

                    <option>

                        Dermatologist

                    </option>

                    <option>

                        Psychiatrist

                    </option>

                    <option>

                        Neurologist

                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-success w-100">

                Register

            </button>

        </form>

        <div class="text-center mt-3">

            Already have an account?

            <a href="/login">

                Login

            </a>
        <a
            href="/google-login"
            class="btn btn-danger w-100 mt-3">
            Continue with Google
        </a>

        </div>

    </div>

    <script>

        const roleSelect =
            document.getElementById(
                "roleSelect"
            );

        const specializationField =
            document.getElementById(
                "specializationField"
            );

        roleSelect.addEventListener(
            "change",
            function () {

                if (
                    this.value ===
                    "supervisor"
                ) {

                    specializationField.style.display =
                        "block";

                } else {

                    specializationField.style.display =
                        "none";
                }
            }
        );

    </script>

</body>

</html>
