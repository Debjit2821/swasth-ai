<!DOCTYPE html>
<html>

<head>

    <title>Register - SWASTH-AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {

            background: linear-gradient(
                135deg,
                #0d6efd,
                #4dabf7
            );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .register-card {

            width: 100%;

            max-width: 500px;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0px 8px 30px rgba(0,0,0,0.15);
        }

        .form-title {

            text-align: center;

            margin-bottom: 30px;

            font-weight: bold;

            color: #0d6efd;
        }

        .btn-register {

            width: 100%;

            padding: 12px;

            font-size: 17px;

            border-radius: 10px;
        }

        #specializationField {

            display: none;
        }

    </style>

</head>

<body>

    <div class="register-card">

        <h2 class="form-title">

            Create Account

        </h2>

        <!-- FLASH MESSAGES -->

        {% with messages = get_flashed_messages(with_categories=true) %}

            {% if messages %}

                <div class="mt-3">

                    {% for category, message in messages %}

                        <div class="alert alert-{{ category }} alert-dismissible fade show"
                             role="alert">

                            {{ message }}

                            <button type="button"
                                    class="btn-close"
                                    data-bs-dismiss="alert">
                            </button>

                        </div>

                    {% endfor %}

                </div>

            {% endif %}

        {% endwith %}

        <!-- REGISTER FORM -->

        <form method="POST">

            <!-- NAME -->

            <div class="mb-3">

                <label class="form-label">

                    Full Name

                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required>

            </div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <!-- ROLE -->

            <div class="mb-3">

                <label class="form-label">

                    Role

                </label>

                <select
                    name="role"
                    id="role"
                    class="form-select"
                    required>

                    <option value="patient">

                        Patient

                    </option>

                    <option value="supervisor">

                        Supervisor

                    </option>

                </select>

            </div>

            <!-- SPECIALIZATION -->

            <div class="mb-3"
                 id="specializationField">

                <label class="form-label">

                    Specialization

                </label>

                <select
                    name="specialization"
                    class="form-select">

                    <option value="General Physician">

                        General Physician

                    </option>

                    <option value="Cardiologist">

                        Cardiologist

                    </option>

                    <option value="Dermatologist">

                        Dermatologist

                    </option>

                    <option value="Psychiatrist">

                        Psychiatrist

                    </option>

                    <option value="Neurologist">

                        Neurologist

                    </option>

                </select>

            </div>

            <!-- SUBMIT -->

            <button
                type="submit"
                class="btn btn-primary btn-register">

                Register

            </button>

        </form>

        <!-- LOGIN -->

        <div class="text-center mt-4">

            Already have an account?

            <a href="/login">

                Login here

            </a>

        </div>

    </div>

    <!-- ROLE SCRIPT -->

    <script>

        const roleSelect =
            document.getElementById("role");

        const specializationField =
            document.getElementById(
                "specializationField"
            );

        roleSelect.addEventListener(
            "change",
            function () {

                if (
                    this.value === "supervisor"
                ) {

                    specializationField.style.display =
                        "block";

                } else {

                    specializationField.style.display =
                        "none";
                }
            }
        );

    </script>

    <!-- BOOTSTRAP -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
