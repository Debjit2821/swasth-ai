<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg border-0 rounded-4 p-5 mx-auto"
         style="max-width: 500px;">

        <h1 class="text-center mb-4">

            Create Account

        </h1>

        <form method="POST">

            <!-- NAME -->

            <input
                type="text"
                name="name"
                class="form-control mb-3"
                placeholder="Full Name"
                required>

            <!-- EMAIL -->

            <input
                type="email"
                name="email"
                class="form-control mb-3"
                placeholder="Email"
                required>

            <!-- PASSWORD -->

            <input
                type="password"
                name="password"
                class="form-control mb-3"
                placeholder="Password"
                required>

            <!-- ROLE -->

            <select
                name="role"
                class="form-select mb-3"
                id="roleSelect"
                onchange="toggleSpecialization()">

                <option value="user">

                    Patient

                </option>

                <option value="supervisor">

                    Supervisor / Doctor

                </option>

            </select>

            <!-- SPECIALIZATION -->

            <div id="specializationDiv" style="display: none;">

                <select
                    name="specialization"
                    class="form-select mb-4">

                    <option value="">

                        Select Specialization

                    </option>

                    <option value="General Physician">

                        General Physician

                    </option>

                    <option value="Cardiologist">

                        Cardiologist

                    </option>

                    <option value="Dermatologist">

                        Dermatologist

                    </option>

                    <option value="Neurologist">

                        Neurologist

                    </option>

                    <option value="Psychiatrist">

                        Psychiatrist

                    </option>

                </select>

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-primary w-100">

                Register

            </button>

        </form>

    </div>

</div>

<!-- SCRIPT -->

<script>

function toggleSpecialization() {

    let role = document.getElementById("roleSelect").value;

    let specializationDiv =
        document.getElementById("specializationDiv");

    if (role === "supervisor") {

        specializationDiv.style.display = "block";

    } else {

        specializationDiv.style.display = "none";

    }
}

</script>

</body>

</html>
