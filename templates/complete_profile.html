<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Complete Profile</title>

    <!-- BOOTSTRAP -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body {

            background: #f4f7fb;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .profile-card {

            width: 100%;

            max-width: 500px;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0px 5px 25px rgba(0,0,0,0.1);
        }

        .title {

            text-align: center;

            font-weight: bold;

            margin-bottom: 30px;

            color: #0d6efd;
        }

        .btn-primary {

            width: 100%;

            padding: 12px;

            font-size: 18px;

            border-radius: 10px;
        }

    </style>

    <script>

        function toggleSpecialization() {

            const role =
                document.getElementById("role").value;

            const specializationField =
                document.getElementById(
                    "specialization-field"
                );

            if (role === "supervisor") {

                specializationField.style.display =
                    "block";

            } else {

                specializationField.style.display =
                    "none";
            }
        }

    </script>

</head>

<body>

    <div class="profile-card">

        <h2 class="title">

            Complete Your Profile

        </h2>

        <form method="POST">

            <!-- NAME -->

            <div class="mb-3">

                <label class="form-label">

                    Full Name

                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter Full Name"
                    required
                >

            </div>

            <!-- PHONE -->

            <div class="mb-3">

                <label class="form-label">

                    Phone Number

                </label>

                <input
                    type="text"
                    name="phone_number"
                    class="form-control"
                    placeholder="Enter Phone Number"
                    required
                >

            </div>

            <!-- ROLE -->

            <div class="mb-3">

                <label class="form-label">

                    Select Role

                </label>

                <select
                    name="role"
                    id="role"
                    class="form-select"
                    onchange="toggleSpecialization()"
                    required
                >

                    <option value="">
                        Choose Role
                    </option>

                    <option value="user">
                        User
                    </option>

                    <option value="supervisor">
                        Supervisor
                    </option>

                </select>

            </div>

            <!-- SPECIALIZATION -->

            <div
                id="specialization-field"
                style="display:none;"
                class="mb-4"
            >

                <label class="form-label">

                    Specialization

                </label>

                <select
                    name="specialization"
                    class="form-select"
                >

                    <option value="">
                        Select Specialization
                    </option>

                    <option>
                        Cardiologist
                    </option>

                    <option>
                        Neurologist
                    </option>

                    <option>
                        Dermatologist
                    </option>

                    <option>
                        Psychiatrist
                    </option>

                    <option>
                        General Physician
                    </option>

                </select>

            </div>

            <!-- BUTTON -->

            <button
                type="submit"
                class="btn btn-primary"
            >

                Complete Profile

            </button>

        </form>

    </div>

</body>

</html>
