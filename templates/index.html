<!DOCTYPE html>
<html>

<head>
    <title>SWASTH-AI</title>
</head>

<body>

    <h1>AI Symptom Analysis</h1> 

    <form method="POST">

        <textarea
            name="symptoms"
            placeholder="Enter symptoms"
            rows="6"
            cols="50"></textarea>

        <br><br>

        <button type="submit">
            Analyze Symptoms
        </button>

    </form>

    <br><br>

    <h2>{{ result }}</h2>

</body>

</html>
